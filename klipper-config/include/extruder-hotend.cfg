# ============================================================================
#  extruder-hotend.cfg — Cabezal: extrusor + hotend
#
#  OPCIÓN A (fiel a tu idea): el cabezal lo gobierna la placa K10 (GD32F303)
#  como MCU secundario "k10". Los pines P?? se obtienen por REVERSING (docs/10).
#
#  OPCIÓN B/C: si usas un board dedicado, cambia el prefijo 'k10:' por el del
#  board (o quítalo si es el MCU principal) y pon sus pines reales.
# ============================================================================

# --- MCU secundario: placa K10. Comms segun la via elegida (docs/04, diagrams/k10-soldadura-usb.md) ---
[mcu k10]
# PARCHEAR segun la via:
#  Opcion A (USB nativo del GD32, recomendada) o C (USB-TTL):  ls /dev/serial/by-id/*
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_XXXXXXXXXXXX-if00
#  Opcion B (UART por GPIO de la Pi): comenta la linea de arriba y usa:
#serial: /dev/ttyAMA0

[extruder]
# --- Motor del extrusor (driver HR4988 de la K10) ---
step_pin: k10:PA0          # PARCHEAR (reversing, docs/10)
dir_pin: k10:PA1           # PARCHEAR  (añade '!' si invierte)
enable_pin: !k10:PA2       # PARCHEAR  (activo-bajo típico)
microsteps: 16
rotation_distance: 33.500  # PARCHEAR: calibrar measure & trim (docs/08)
full_steps_per_rotation: 200   # NEMA17 1.8° (usa 400 si es de 0.9°)
nozzle_diameter: 0.400     # PARCHEAR a tu boquilla
filament_diameter: 1.750

# --- Calefactor + termistor (MOSFET HY1403 + divisor del termistor) ---
heater_pin: k10:PB0        # PARCHEAR: gate del MOSFET (reversing, docs/10)
sensor_type: Generic 3950  # PARCHEAR: validar (Generic 3950 o EPCOS 100K B57560G104F)
sensor_pin: k10:PA3        # PARCHEAR: pin ADC del termistor (reversing)
control: pid               # tras PID_CALIBRATE -> SAVE_CONFIG reescribe Kp/Ki/Kd
pid_Kp: 22.2               # placeholder; lo sobrescribe PID_CALIBRATE
pid_Ki: 1.08
pid_Kd: 114.0
min_temp: 0                # < min_temp o > max_temp => SHUTDOWN de seguridad
max_temp: 250              # PARCHEAR según hotend (250 PTFE / 300+ all-metal)
min_extrude_temp: 170      # no extruye en frío
max_extrude_only_distance: 100.0   # sube si haces purgas/cargas largas

# Protección térmica recomendada (descomenta cuando el termistor esté validado):
#[verify_heater extruder]
#max_error: 120
#check_gain_time: 20
#hysteresis: 5
#heating_gain: 2

# --- Ventiladores ---
[fan]
# Fan de capa (pieza). PARCHEAR al pin del fan en la K10 (reversing).
pin: k10:PB1

#[heater_fan hotend_fan]
# Fan del disipador del hotend (si es controlable). Si va siempre a 12V fijo, omítelo.
#pin: k10:PB10
#heater: extruder
#heater_temp: 50.0
