[mcu]
# PARCHEAR: pon TU ruta. Obtenla con:  ls /dev/serial/by-id/*
# Uno genuino suele ser usb-Arduino__...  ; clon CH340: usb-1a86_USB_Serial-...
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
baud: 250000
# Si tienes 2 placas con CH340 sin serie única, usa /dev/serial/by-path/... (ver docs/01)

