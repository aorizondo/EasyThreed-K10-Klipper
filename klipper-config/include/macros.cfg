# ============================================================================
#  macros.cfg — Macros básicas
# ============================================================================

[gcode_macro PRINT_START]
# Llama esto al inicio del G-code (configúralo en tu slicer como Start G-code:
#   PRINT_START BED=[first_layer_bed_temperature] EXTRUDER=[first_layer_temperature]
gcode:
    {% set BED = params.BED|default(0)|float %}
    {% set EXTRUDER = params.EXTRUDER|default(200)|float %}
    M104 S{EXTRUDER}                 # calienta hotend (sin esperar)
    #M140 S{BED}                     # cama (si añades cama caliente)
    G28                              # homing
    #BED_MESH_PROFILE LOAD=default   # carga malla (si usas bed_mesh)
    M109 S{EXTRUDER}                 # espera hotend
    #M190 S{BED}
    G92 E0
    G90

[gcode_macro PRINT_END]
gcode:
    M104 S0                          # apaga hotend
    #M140 S0                         # apaga cama
    M106 S0                          # apaga fan
    G91
    G1 E-2 F1800                     # retracción
    G1 Z5 F600                       # sube Z
    G90
    G1 X0 Y0 F3000                   # aparca
    M84                              # desactiva motores

[gcode_macro G32]
# Atajo de homing (placeholder para futuros quad/z-tilt si añades 2 motores Z)
gcode:
    G28

# Util: descargar/cargar filamento manualmente
[gcode_macro LOAD_FILAMENT]
gcode:
    M83
    G1 E50 F300
    G1 E20 F150
    M82

[gcode_macro UNLOAD_FILAMENT]
gcode:
    M83
    G1 E5 F300
    G1 E-60 F1200
    M82
