# ============================================================================
#  steppers-xyz.cfg — Ejes X/Y/Z en el MCU del CNC (Arduino + CNC Shield V3)
#  Pinout VERIFICADO (CNC Shield V3 / klipper-drawbot). Ver docs/03 y docs/06.
#
#  rotation_distance es PROVISIONAL: la mecánica Epson no es estándar.
#  CALÍBRALO con "mover y medir" (docs/08). Punto de partida: 40 (correa GT2-20T).
#  position_max: ajústalo a TU volumen real (~280 x 280 x 70 mm).
# ============================================================================

[stepper_x]
step_pin: PD2
dir_pin: PD5                 # añade '!' si va al revés:  !PD5
enable_pin: !PB0            # ENABLE común a todos los drivers (activo-bajo)
microsteps: 16             # NO subir a 32 en ATmega328P (riesgo Timer too close)
rotation_distance: 40      # PARCHEAR tras calibrar (docs/08)
endstop_pin: ^PB1          # X-limit (D9). '^' = pull-up. Añade '!' si es NC->invertido
position_endstop: 0
position_min: 0
position_max: 280          # PARCHEAR a tu recorrido real
homing_speed: 30

[stepper_y]
step_pin: PD3
dir_pin: PD6                # '!PD6' si va al revés
enable_pin: !PB0
microsteps: 16
rotation_distance: 40      # PARCHEAR tras calibrar
endstop_pin: ^PB2          # Y-limit (D10)
position_endstop: 0
position_min: 0
position_max: 280          # PARCHEAR
homing_speed: 30

[stepper_z]
step_pin: PD4
dir_pin: PD7                # '!PD7' si va al revés
enable_pin: !PB0
microsteps: 16
rotation_distance: 8       # PARCHEAR: husillo (T8 lead8=8, T8 lead2=2, M5=0.8) o correa
endstop_pin: ^PB4          # Z-limit (D12). OJO: PB4, no PB3 (spindle PWM). Ver docs/03
position_endstop: 0        # si usas SONDA Z -> cambia por: probe:z_virtual_endstop y borra esta línea
position_min: -0.5         # margen para z_offset
position_max: 70           # PARCHEAR a tu Z real
homing_speed: 6            # Z lento

# Nota homing: con position_endstop=0 (=position_min) Klipper homea hacia el mínimo.
# Si tu endstop está en el máximo, pon position_endstop=position_max.
