# ============================================================================
#  probe-zsensor.cfg — Sonda de eje Z y bed mesh (OPCIONAL)
#  Descomenta UNA de las opciones según tu sonda. Detalle en docs/09.
#  Conecta la sonda en el MCU del CNC (mismo MCU que XYZ) para homing fiable.
#
#  Si usas sonda como endstop de Z: en steppers-xyz.cfg pon en [stepper_z]
#     endstop_pin: probe:z_virtual_endstop
#  y ELIMINA position_endstop. Luego activa [safe_z_home] de abajo.
# ============================================================================

# ---------- Opción 1: microswitch / sonda de 1 hilo como [probe] ----------
#[probe]
#pin: ^PB3                 # PARCHEAR a un pin libre del CNC (^ pull-up, ! si invierte)
#x_offset: 0.0             # MIDE respecto a la boquilla
#y_offset: 25.0
##z_offset: 1.0            # lo escribe PROBE_CALIBRATE
#speed: 5.0
#samples: 3
#samples_result: median
#sample_retract_dist: 2.0

# ---------- Opción 2: sonda inductiva NPN (cama metálica; adaptar nivel) ----------
#[probe]
#pin: ^PB3                 # ^!PB3 si aparece invertida
#x_offset: 20.0
#y_offset: 0.0
##z_offset: 0.8
#speed: 5.0
#samples: 2

# ---------- Opción 3: BLTouch / CRTouch (necesita 2 pines libres) ----------
#[bltouch]
#sensor_pin: ^PB3
#control_pin: PB5
#stow_on_each_sample: True
#x_offset: -40.0
#y_offset: -10.0
##z_offset: 1.5
#samples: 2
#samples_tolerance: 0.05

# ---------- Homing seguro con sonda ----------
#[safe_z_home]
#home_xy_position: 140, 140    # centro de TU cama
#speed: 50
#z_hop: 10
#z_hop_speed: 5

# ---------- Malla de cama ----------
#[bed_mesh]
#speed: 120
#horizontal_move_z: 5
#mesh_min: 20, 20
#mesh_max: 260, 260            # PARCHEAR al alcance real de la sonda
#probe_count: 5, 5
#algorithm: bicubic
