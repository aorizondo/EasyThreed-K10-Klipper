# ============================================================================
#  printer.cfg — Frankenprinter K10 + CNC (Klipper multi-MCU)
#  Config de PARTIDA para experimentar. Lee docs/ antes de aplicar potencia.
#
#  Copia este archivo y la carpeta include/ a:  ~/printer_data/config/
#  Ajusta los 'serial:' (ls /dev/serial/by-id/*) y los pines marcados PARCHEAR.
# ============================================================================

# --- Módulos (cada uno comentado y documentado) ---
[include include/mcu-cnc.cfg]        # MCU principal: Arduino Uno + CNC Shield (XYZ)
[include include/steppers-xyz.cfg]   # Ejes X/Y/Z
[include include/extruder-hotend.cfg]# Cabezal: extrusor + hotend (MCU k10 u otro board)
#[include include/probe-zsensor.cfg] # Sonda Z (descomenta cuando la montes)
[include include/macros.cfg]         # Macros PRINT_START/END, etc.

# ============================================================================
#  Cinemática general de la impresora
# ============================================================================
[printer]
kinematics: cartesian
# Empieza CONSERVADOR. Sube cuando todo funcione y tras input shaping.
max_velocity: 150
max_accel: 1500
max_z_velocity: 10
max_z_accel: 100
# Recuerda el límite de step-rate del ATmega328P (ver docs/03). 1/16 microsteps.

# ============================================================================
#  Almacenamiento de G-code (lo sirve Moonraker/Mainsail)
# ============================================================================
[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]
[pause_resume]

# Soporte de arcos G2/G3 (útil si reaprovechas G-code de CNC)
[gcode_arcs]
resolution: 1.0

# ============================================================================
#  NOTA: tras PID_CALIBRATE / PROBE_CALIBRATE / SHAPER_CALIBRATE, Klipper
#  añade un bloque "#*# <---------------------- SAVE_CONFIG ---------------->"
#  al final de ESTE archivo. No lo edites a mano.
# ============================================================================
